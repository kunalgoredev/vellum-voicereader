<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vellum</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background:  #080810;
      color:       #ededf8;
      height:      100vh;
      display:     flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap:         36px;
      user-select: none;
      -webkit-app-region: drag;
      -webkit-font-smoothing: antialiased;
    }

    .brand h1 {
      font-size:      2rem;
      font-weight:    700;
      letter-spacing: -0.04em;
      text-align:     center;
      margin-bottom:  4px;
    }

    .brand p {
      font-size:   0.78rem;
      color:       #8080a8;
      text-align:  center;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .progress-block {
      width:          300px;
      display:        flex;
      flex-direction: column;
      gap:            10px;
    }

    .track {
      width:        100%;
      height:       3px;
      background:   #1e1e38;
      border-radius: 2px;
      overflow:     hidden;
    }

    .fill {
      height:        100%;
      width:         0%;
      background:    linear-gradient(90deg, #7b68f0, #9d8fff);
      border-radius: 2px;
      transition:    width 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .status-text {
      font-size:  0.76rem;
      color:      #8080a8;
      text-align: center;
      min-height: 18px;
      transition: color 0.2s;
    }

    .status-text.is-error { color: #f87171; }

    .error-detail {
      margin-top:    12px;
      padding:       12px 16px;
      background:    rgba(248, 113, 113, 0.07);
      border:        1px solid rgba(248, 113, 113, 0.25);
      border-radius: 8px;
      font-size:     0.73rem;
      color:         #f87171;
      line-height:   1.55;
      text-align:    center;
      display:       none;
      white-space:   pre-wrap;
    }

    .dot {
      display:        inline-block;
      width:          6px;
      height:         6px;
      border-radius:  50%;
      background:     #7b68f0;
      margin-right:   8px;
      vertical-align: middle;
      animation:      pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1;    transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }
  </style>
</head>
<body>
  <div class="brand">
    <h1>Vellum</h1>
    <p>Voice Studio</p>
  </div>

  <div class="progress-block">
    <div class="track"><div class="fill" id="fill"></div></div>
    <div class="status-text" id="statusText">
      <span class="dot"></span>Starting…
    </div>
    <div class="error-detail" id="errorDetail"></div>
  </div>

  <script>
    const fillEl   = document.getElementById('fill');
    const statusEl = document.getElementById('statusText');
    const errorEl  = document.getElementById('errorDetail');

    let lastPct = 0;

    window.vellum?.onStatus(({ msg, progress }) => {
      statusEl.innerHTML = `<span class="dot"></span>${msg}`;
      if (progress >= 0 && progress > lastPct) {
        lastPct = progress;
        fillEl.style.width = progress + '%';
      }
    });

    window.vellum?.onError((msg) => {
      statusEl.innerHTML = '⚠ Setup failed';
      statusEl.classList.add('is-error');
      errorEl.style.display = 'block';
      errorEl.textContent   = msg;
      fillEl.style.background = '#f87171';
      document.querySelector('.dot').style.background = '#f87171';
    });
  </script>
</body>
</html>
